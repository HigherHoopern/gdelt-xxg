<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <style>
        /* 全局样式美化 */
        body { font-family: 'PingFang SC', 'Helvetica Neue', 'Helvetica', 'Arial', sans-serif; }
        .gradio-container { max-width: 98% !important; background-color: #f4f7f9 !important; }
        footer { display: none !important; }
        
        /* 按钮与交互 */
        button.primary, .gr-button-primary { 
            background-color: #1467DF !important; 
            border-color: #1467DF !important; 
            color: white !important; 
        }
        .tabs .tabitem.selected { border-color: #1467DF !important; font-weight: bold !important; }
        
        /* AI 报告区域定制 */
        #ai-report-container { 
            height: 1000px !important; 
            border: 1px solid #e0e0e0; 
            padding: 20px; 
            border-radius: 12px; 
            background: #ffffff; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.05); 
            display: flex !important; 
            flex-direction: column !important; 
        }
        #ai-report-scroll-area { 
            flex-grow: 1 !important; 
            height: 850px !important; 
            overflow-y: auto !important; 
            border-top: 1px solid #eee; 
            margin-top: 10px; 
            padding-top: 15px; 
        }
        
        /* 响应式优化 */
        .gr-html { border-radius: 12px; overflow: hidden; }
    </style>
</head>
<body>
    <!-- Gradio 6.0 兼容头部注入 -->
</body>
</html>
