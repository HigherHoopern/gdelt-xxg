<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>全球地缘风险分析平台</title>
    <style>
        /* 全局美化 */
        :root { --primary: #1467DF; --bg: #f4f7f9; }
        body { margin: 0; padding: 0; background-color: var(--bg); font-family: 'PingFang SC', sans-serif; }
        
        /* 顶部导航栏 */
        .navbar { 
            background: #fff; height: 60px; display: flex; align-items: center; 
            padding: 0 30px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); 
            position: sticky; top: 0; z-index: 1000;
        }
        .navbar-brand { font-size: 20px; font-weight: bold; color: var(--primary); display: flex; align-items: center; gap: 10px; }
        
        /* 仪表盘主容器 */
        .dashboard-container { padding: 20px; max-width: 1600px; margin: 0 auto; }
        
        /* 栅格布局 */
        .grid-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .card { background: #fff; border-radius: 12px; padding: 15px; box-shadow: 0 4px 16px rgba(0,0,0,0.06); }
        .card-header { font-weight: bold; margin-bottom: 15px; border-left: 4px solid var(--primary); padding-left: 10px; }

        /* 隐藏 Gradio 原始头部 */
        .gradio-container footer, .gr-pro { display: none !important; }
        
        /* 定制实时新闻表格 */
        #news-list-container { min-height: 800px; }

        /* 搬运脚本：当 Gradio 组件出现后，将它们移动到对应的 HTML 容器中 */
        <script>
            function moveComponents() {
                const mappings = {
                    '#continent-selector-raw': '#continent-anchor',
                    '#country-selector-raw': '#country-anchor',
                    '#map-plot-raw': '#map-anchor',
                    '#predict-plot-raw': '#predict-anchor',
                    '#trend-box-raw': '#trend-anchor',
                    '#news-html-box-raw': '#news-anchor',
                    '#search-box-raw': '#search-anchor',
                    '#search-btn-raw': '#search-btn-anchor'
                };
                
                for (let source in mappings) {
                    let srcEl = document.querySelector(source);
                    let destEl = document.querySelector(mappings[source]);
                    if (srcEl && destEl && !destEl.contains(srcEl)) {
                        destEl.appendChild(srcEl);
                    }
                }
            }
            // 每隔 500ms 检查一次，直到组件全部挂载
            setInterval(moveComponents, 500);
        </script>
    </style>
</head>
<body>
    <div class="navbar">
        <div class="navbar-brand">🌍 全球地缘政治风险分析平台</div>
        <div style="flex-grow: 1;"></div>
        <div id="continent-anchor" style="width: 150px; margin-right: 10px;"></div>
        <div id="country-anchor" style="width: 150px;"></div>
    </div>

    <div class="dashboard-container">
        <!-- 风险监测区 -->
        <div class="grid-row">
            <div class="card">
                <div class="card-header">📊 全球风险动态演变</div>
                <div id="map-anchor"></div>
            </div>
            <div class="card">
                <div class="card-header">📈 未来 5 日风险预测</div>
                <div id="predict-anchor"></div>
            </div>
        </div>

        <div class="card" style="margin-bottom: 20px;">
            <div class="card-header">📉 30 天历史风险波动趋势</div>
            <div id="trend-anchor"></div>
        </div>

        <!-- 实时新闻区 -->
        <div class="card">
            <div class="card-header" style="display: flex; justify-content: space-between; align-items: center;">
                <span>📰 实时新闻 (全球)</span>
                <div style="display: flex; gap: 10px; width: 400px;">
                    <div id="search-anchor" style="flex-grow: 1;"></div>
                    <div id="search-btn-anchor"></div>
                </div>
            </div>
            <div id="news-anchor"></div>
        </div>
    </div>

    <!-- Gradio 的原始组件会被渲染在 body 的最下方，然后被上面的脚本搬走 -->
</body>
</html>
